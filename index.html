<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Youtube Clone</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="mainContainer">
      <!-- Header Section -->
      <div class="headerSection">
        <div class="navbar">
          <div class="firstSec">
            <i class="fa fa-bars"></i>
            <span class="navHeading">
              <img src="assets/youtube.png" alt="" />
              <h3>premium <sup>in</sup></h3>
            </span>
          </div>
          <div class="secSect">
            <div class="searchBar">
              <input type="text" placeholder="Search" />
              <i class="fa fa-magnifying-glass"></i>
            </div>
          </div>
          <div class="thirdSect">
            <div class="create">
              <i class="fa fa-plus"></i>
              <p>create</p>
            </div>
            <div class="bell">
              <i class="fa-regular fa-bell"></i>
            </div>
          </div>
        </div>
      </div>
      <!-- Video Section -->
      <div class="videoSection">
        <div class="mainVideo">
          <iframe
            src="https://www.youtube.com/embed/h13RYohtLv0?si=96HMk2N_6c_w_c8J"
            title="YouTube video player"
            frameborder="0"
            allow="
              accelerometer;
              autoplay;
              clipboard-write;
              encrypted-media;
              gyroscope;
              picture-in-picture;
              web-share;
            "
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen
          ></iframe>
          <div class="videoTitle">
            <h2>
              “Unlocking the Secret of Namamishamishan: The Mystery You've Never
              Heard Of!”
            </h2>
          </div>
          <div class="videoContent">
            <div class="videoSubTitle">
              <p>Sound Of Spirituality and Chaupai Suvidha</p>
              <button>subcribe</button>
            </div>
            <div class="videoFeatures">
              <span>
                <i class="fa fa-thumbs-up"></i>
                51k | <i class="fa fa-thumbs-down"></i>
              </span>
              <span>
                <i class="fa fa-share"></i>
                share
              </span>
              <span>
                <i class="fa fa-download"></i>
                download
              </span>
              <span>
                <i class="fa fa-bookmark"></i>
                save
              </span>
            </div>
          </div>
        </div>
        <div class="listVideo">list video</div>
      </div>
    </div>
    <!-- <iframe width="560" height="315" src="https://www.youtube.com/embed/uMXwKwb29vI?si=DGxPpN6maACJUHT5" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe> -->
  </body>
</html>
